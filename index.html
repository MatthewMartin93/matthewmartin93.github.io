<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 500px;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            color: #111;
        }
        .title {
            font-size: 1.1rem;
            color: #0076ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 32px;
        }
        .links a {
            color: #333;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .links a:hover {
            color: #0076ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Matthew Martin</h1>
        
        <div class="title">Development and Cybersecurity</div>
        
        <p>
            I have experience in many programming languages, including C++, Java, HTML, and Python.
            I have also learned about cybersecurity and how to use wireshark to analyze
            network traffic.
        </p>
        
        <div class="links">
            <a href="https://github.com/matthewmartin93" target="_blank">GitHub</a>
            <a href="projects.html">Projects</a>
        </div>
    </div>

</body>
</html>
